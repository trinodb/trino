databases:
    hive:
        # HMS-only style: HiveServer2 is not started in this environment (see Hive4WithMinioHttpThrift).
        # Smoke tests use Trino only (onTrino). A bogus JDBC URL prevents Tempto from opening a Hive2 session.
        host: metastore
        jdbc_driver_class: org.apache.hive.jdbc.HiveDriver
        jdbc_url: jdbc:hive2://${databases.hive.host}:12345
        jdbc_user: hive
        jdbc_password: na
        jdbc_pooling: false
        schema: default
        prepare_statement:
            - USE ${databases.hive.schema}
            - SET hive.stats.column.autogather=false
        table_manager_type: hive
        warehouse_directory_path: s3a://${S3_BUCKET}/
        metastore:
            host: metastore
            port: 9083
