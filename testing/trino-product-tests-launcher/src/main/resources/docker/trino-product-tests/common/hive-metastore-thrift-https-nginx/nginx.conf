worker_processes  1;
events {
    worker_connections 1024;
}
http {
    server {
        listen 443 ssl;
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        location /metastore {
            proxy_pass http://metastore:9083;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
