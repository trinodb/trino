connector.name=hive
hive.metastore=thrift
hive.metastore.uri=https://hms-thrift-https:443/metastore
hive.metastore.http.client.authentication.type=BEARER
hive.metastore.http.client.bearer-token=test-hms-bearer-token
# Hive 4 HMS HTTP (non-JWT) requires x-actor-username (see ServletSecurity); forwarded by nginx to HMS.
hive.metastore.http.client.additional-headers=x-actor-username:hive
hive.non-managed-table-writes-enabled=true
fs.s3.enabled=true
fs.hadoop.enabled=false
s3.region=us-east-1
s3.aws-access-key=minio-access-key
s3.aws-secret-key=minio-secret-key
s3.endpoint=http://minio:9080/
s3.path-style-access=true

hive.parquet.time-zone=UTC
hive.rcfile.time-zone=UTC
